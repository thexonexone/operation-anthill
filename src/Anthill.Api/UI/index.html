<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ANTHILL Colony — v1.8.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#050302;font-family:'Courier New',monospace;color:#c8a96e;}
#cw{position:relative;width:100%;height:100vh;}
canvas{display:block;width:100%;height:100%;}
#hud{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}

#queen-bar{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(5,3,2,0.90);border:1px solid #6b4a1e;border-radius:2px;padding:7px 22px;text-align:center;}
#queen-bar .qlabel{font-size:9px;letter-spacing:3px;color:#7a5a2a;text-transform:uppercase;margin-bottom:2px;}
#queen-bar .qmission{font-size:12px;color:#e8c87e;letter-spacing:1px;}
.qpulse{display:inline-block;width:6px;height:6px;background:#e8c87e;border-radius:50%;margin-right:6px;animation:blink 1.2s ease-in-out infinite;}

#colony-stats{position:absolute;top:58px;left:14px;background:rgba(5,3,2,0.90);border:1px solid #3d2510;border-radius:2px;padding:8px 12px;min-width:148px;}
#colony-stats .sh{font-size:9px;letter-spacing:3px;color:#7a5a2a;margin-bottom:7px;}
.cs{display:flex;justify-content:space-between;font-size:10px;color:#6a5030;margin-bottom:4px;}
.cs .cv{color:#c8a96e;}

#side-panel{position:absolute;top:58px;right:14px;width:216px;background:rgba(5,3,2,0.90);border:1px solid #3d2510;border-radius:2px;pointer-events:all;max-height:calc(100vh - 120px);overflow:hidden;display:flex;flex-direction:column;}
#side-panel .sh{padding:7px 11px;border-bottom:1px solid #3d2510;font-size:9px;letter-spacing:3px;color:#7a5a2a;flex-shrink:0;}
#agent-detail{padding:11px;flex:1;overflow-y:auto;}
#agent-detail .an{font-size:13px;color:#e8c87e;margin-bottom:3px;}
#agent-detail .at{font-size:9px;letter-spacing:2px;margin-bottom:9px;}
#agent-detail .sr{display:flex;justify-content:space-between;font-size:10px;color:#8a6a3a;margin-bottom:3px;border-bottom:1px solid #1a1008;padding-bottom:3px;}
#agent-detail .sv{color:#c8a96e;}
#agent-detail .tl{font-size:9px;letter-spacing:2px;color:#5a4a2a;margin-top:9px;margin-bottom:3px;}
#agent-detail .tt{font-size:10px;color:#a88a4e;line-height:1.5;}
#agent-detail .pb{height:3px;background:#1a1008;border-radius:1px;overflow:hidden;margin-top:6px;}
#agent-detail .pf{height:100%;background:linear-gradient(90deg,#3d6b1e,#7ade3e);transition:width 1s;}

#mission-log{position:absolute;bottom:58px;left:14px;width:274px;background:rgba(5,3,2,0.90);border:1px solid #3d2510;border-radius:2px;pointer-events:none;}
#mission-log .sh{padding:6px 11px;border-bottom:1px solid #3d2510;font-size:9px;letter-spacing:3px;color:#7a5a2a;}
#log-entries{padding:7px;max-height:138px;overflow-y:auto;display:flex;flex-direction:column-reverse;}
.le{font-size:9px;color:#6a5a3a;line-height:1.6;display:flex;gap:5px;}
.lt{color:#4a3a1e;flex-shrink:0;}
.la{flex-shrink:0;}
.lm{color:#8a7a5a;}
.le.fresh .lm{color:#b8a86e;}

#mission-input-wrap{position:absolute;bottom:14px;left:14px;width:274px;pointer-events:all;}
#mission-input-wrap input{width:100%;background:rgba(5,3,2,0.92);border:1px solid #6b4a1e;color:#e8c87e;padding:7px 10px;font-family:'Courier New',monospace;font-size:11px;outline:none;border-radius:2px;}
#mission-input-wrap input::placeholder{color:#4a3a1e;}
#mission-input-wrap .hint{font-size:8px;color:#3a2a10;letter-spacing:1px;margin-top:3px;}

#zoom-hint{position:absolute;bottom:14px;right:14px;font-size:8px;color:#3a2a10;letter-spacing:1px;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:#0a0604;}
::-webkit-scrollbar-thumb{background:#3d2510;}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
</style>
</head>
<body>
<div id="cw">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="queen-bar">
      <div class="qlabel">Queen Core — Mission Control</div>
      <div class="qmission"><span class="qpulse"></span><span id="mission-text">AWAITING DIRECTIVE</span></div>
    </div>
    <div id="colony-stats">
      <div class="sh">COLONY STATUS</div>
      <div class="cs">Active Agents <span class="cv" id="stat-active">0</span></div>
      <div class="cs">Missions Run <span class="cv" id="stat-missions">0</span></div>
      <div class="cs">Tasks Complete <span class="cv" id="stat-tasks">0</span></div>
      <div class="cs">Pheromone Avg <span class="cv" id="stat-phero">0%</span></div>
    </div>
    <div id="side-panel">
      <div class="sh">AGENT INSPECTOR</div>
      <div id="agent-detail"><div style="font-size:10px;color:#4a3a1e;margin-top:18px;text-align:center;">Click an agent node<br>to inspect</div></div>
    </div>
    <div id="mission-log">
      <div class="sh">COLONY FEED</div>
      <div id="log-entries"></div>
    </div>
    <div id="mission-input-wrap">
      <input id="mission-input" type="text" placeholder="Enter mission directive and press Enter..." autocomplete="off" />
      <div class="hint">DISPATCHES TO QUEEN → DISTRIBUTES ACROSS COLONY</div>
    </div>
    <div id="zoom-hint">SCROLL TO ZOOM · DRAG TO PAN · CLICK NODES</div>
  </div>
</div>
<script>
'use strict';
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,cx,cy;
function resize(){const w=document.getElementById('cw');W=canvas.width=w.clientWidth;H=canvas.height=w.clientHeight;cx=W/2;cy=H/2;}
resize();window.addEventListener('resize',()=>{resize();buildNodes();});

let camX=0,camY=0,camZ=1,tX=0,tY=0,tZ=1;
const AT={QUEEN:{color:'#f0c040',r:28},SCOUT:{color:'#40d8d0',r:16},WORKER:{color:'#e88030',r:14},SOLDIER:{color:'#e03050',r:15},BUILDER:{color:'#9050e0',r:14},FORAGER:{color:'#40c050',r:14},ARCHIVIST:{color:'#4090e0',r:14}};
const TASKS={SCOUT:['Probing external API endpoints','Scanning knowledge graph','Gathering mission parameters','Crawling data sources','Mapping dependency tree'],WORKER:['Processing extracted records','Chunking task payload','Normalizing data schema','Indexing retrieved context','Merging parallel outputs'],SOLDIER:['Validating schema integrity','Running risk assessment','Cross-checking agent outputs','Detecting anomaly in feed','Enforcing mission constraints'],BUILDER:['Generating workflow scaffold','Composing automation script','Building output artifact','Assembling final report','Drafting execution plan'],FORAGER:['Locating missing resource','Hunting alternate data path','Retrieving cached context','Sourcing tool dependency','Finding parallel branch'],ARCHIVIST:['Writing pheromone record','Updating memory graph','Archiving mission outcome','Storing workflow pattern','Encoding success trail']};

let nodes=[],edges=[],particles=[],selectedNode=null;
function h2r(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

function buildNodes(){
  nodes=[];edges=[];
  const bR=Math.min(W,H)*.27;
  nodes.push({id:'queen',type:'QUEEN',x:cx,y:cy,label:'Queen',task:'Orchestrating colony mission',status:'active',phero:1,pp:0});
  const branches=[{type:'SCOUT',angle:-90,ch:2},{type:'WORKER',angle:-18,ch:3},{type:'SOLDIER',angle:54,ch:2},{type:'BUILDER',angle:126,ch:2},{type:'FORAGER',angle:198,ch:2},{type:'ARCHIVIST',angle:270,ch:2}];
  const sR=bR*.45;
  branches.forEach((b,bi)=>{
    const rad=b.angle*Math.PI/180,bx=cx+Math.cos(rad)*bR,by=cy+Math.sin(rad)*bR;
    const tArr=TASKS[b.type],nid=`${b.type.toLowerCase()}_0`;
    nodes.push({id:nid,type:b.type,x:bx,y:by,label:`${b.type[0]}${b.type.slice(1).toLowerCase()}-0`,task:tArr[bi%tArr.length],status:Math.random()>.2?'active':'idle',phero:.5+Math.random()*.5,pp:Math.random()*Math.PI*2});
    edges.push({from:'queen',to:nid,phero:.6+Math.random()*.4});
    for(let c=0;c<b.ch;c++){
      const sa=(c-(b.ch-1)/2)*40,cr=(b.angle+sa)*Math.PI/180,cnid=`${b.type.toLowerCase()}_${c+1}`;
      nodes.push({id:cnid,type:b.type,x:bx+Math.cos(cr)*sR,y:by+Math.sin(cr)*sR,label:`${b.type[0]}${b.type.slice(1).toLowerCase()}-${c+1}`,task:tArr[(bi+c+1)%tArr.length],status:Math.random()>.3?'active':'idle',phero:.3+Math.random()*.6,pp:Math.random()*Math.PI*2});
      edges.push({from:nid,to:cnid,phero:.3+Math.random()*.5});
    }
  });
}
buildNodes();

function spawnParticle(e){
  const fn=nodes.find(n=>n.id===e.from),tn=nodes.find(n=>n.id===e.to);
  if(!fn||!tn)return;
  const[r,g,b]=h2r(AT[tn.type].color);
  particles.push({fn,tn,t:0,speed:.004+Math.random()*.006,r,g,b,a:.6+Math.random()*.4,sz:1.5+Math.random()*2});
}
let lastSpawn=0;
function maybeSpawn(ts){
  if(ts-lastSpawn<180)return;lastSpawn=ts;
  const active=edges.filter(e=>{const tn=nodes.find(n=>n.id===e.to);return tn&&tn.status==='active';});
  const n=Math.min(3,active.length);
  for(let i=0;i<n;i++)spawnParticle(active[Math.floor(Math.random()*active.length)]);
}

function w2s(wx,wy){return{x:(wx-cx)*camZ+cx+camX,y:(wy-cy)*camZ+cy+camY};}
function s2w(sx,sy){return{x:(sx-cx-camX)/camZ+cx,y:(sy-cy-camY)/camZ+cy};}
function qb(fp,cp,tp,t){return{x:Math.pow(1-t,2)*fp.x+2*(1-t)*t*cp.x+t*t*tp.x,y:Math.pow(1-t,2)*fp.y+2*(1-t)*t*cp.y+t*t*tp.y};}
function cp4(fp,tp){const dx=tp.x-fp.x,dy=tp.y-fp.y;return{x:fp.x+dx*.5+dy*.12,y:fp.y+dy*.5-dx*.12};}

function drawBg(){
  ctx.fillStyle='#050302';ctx.fillRect(0,0,W,H);
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*.7);
  g.addColorStop(0,'rgba(28,14,4,.55)');g.addColorStop(1,'rgba(5,2,1,.1)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawEdge(e){
  const fn=nodes.find(n=>n.id===e.from),tn=nodes.find(n=>n.id===e.to);if(!fn||!tn)return;
  const fp=w2s(fn.x,fn.y),tp=w2s(tn.x,tn.y),cp=cp4(fp,tp);
  const[r,g,b]=h2r(AT[tn.type].color);
  ctx.beginPath();ctx.moveTo(fp.x,fp.y);ctx.quadraticCurveTo(cp.x,cp.y,tp.x,tp.y);
  ctx.strokeStyle='rgba(28,16,6,.92)';ctx.lineWidth=(4+e.phero*6)*camZ;ctx.stroke();
  ctx.beginPath();ctx.moveTo(fp.x,fp.y);ctx.quadraticCurveTo(cp.x,cp.y,tp.x,tp.y);
  ctx.strokeStyle='rgba(58,33,10,.5)';ctx.lineWidth=(2+e.phero*3)*camZ;ctx.stroke();
  const al=e.phero*(tn.status==='active'?.35:.08);
  ctx.beginPath();ctx.moveTo(fp.x,fp.y);ctx.quadraticCurveTo(cp.x,cp.y,tp.x,tp.y);
  ctx.strokeStyle=`rgba(${r},${g},${b},${al})`;ctx.lineWidth=(1+e.phero*2)*camZ;ctx.stroke();
}

function drawParticles(){
  particles.forEach(p=>{
    const fp=w2s(p.fn.x,p.fn.y),tp=w2s(p.tn.x,p.tn.y),cp=cp4(fp,tp);
    for(let i=3;i>=0;i--){
      const tt=Math.max(0,p.t-i*.025),pp=qb(fp,cp,tp,tt);
      ctx.beginPath();ctx.arc(pp.x,pp.y,p.sz*(4-i)/4*camZ,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${p.a*(1-i/4)*.4})`;ctx.fill();
    }
    const pos=qb(fp,cp,tp,p.t);
    ctx.beginPath();ctx.arc(pos.x,pos.y,p.sz*camZ,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${p.a})`;ctx.fill();
    const gg=ctx.createRadialGradient(pos.x,pos.y,0,pos.x,pos.y,p.sz*4*camZ);
    gg.addColorStop(0,`rgba(${p.r},${p.g},${p.b},.3)`);gg.addColorStop(1,`rgba(${p.r},${p.g},${p.b},0)`);
    ctx.beginPath();ctx.arc(pos.x,pos.y,p.sz*4*camZ,0,Math.PI*2);ctx.fillStyle=gg;ctx.fill();
  });
}

function drawNode(n,ts){
  const sp=w2s(n.x,n.y),ti=AT[n.type],r=ti.r*camZ;
  if(r<3)return;
  const[cr,cg,cb]=h2r(ti.color),active=n.status==='active',sel=selectedNode&&selectedNode.id===n.id;
  const pulse=Math.sin(ts*.002+n.pp)*.15+.85;
  if(active)for(let ring=3;ring>=1;ring--){ctx.beginPath();ctx.arc(sp.x,sp.y,r*(1+ring*.5)*pulse,0,Math.PI*2);ctx.fillStyle=`rgba(${cr},${cg},${cb},${.04/ring})`;ctx.fill();}
  if(sel){ctx.beginPath();ctx.arc(sp.x,sp.y,r*1.8,0,Math.PI*2);ctx.strokeStyle=`rgba(${cr},${cg},${cb},.7)`;ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);}
  ctx.beginPath();ctx.arc(sp.x,sp.y,r*1.15,0,Math.PI*2);ctx.fillStyle='rgba(8,5,2,.95)';ctx.fill();
  const grad=ctx.createRadialGradient(sp.x-r*.3,sp.y-r*.3,0,sp.x,sp.y,r);
  grad.addColorStop(0,`rgba(${Math.min(255,cr+80)},${Math.min(255,cg+80)},${Math.min(255,cb+60)},${active?.95:.4})`);
  grad.addColorStop(.6,`rgba(${cr},${cg},${cb},${active?.8:.3})`);
  grad.addColorStop(1,`rgba(${cr>>2},${cg>>2},${cb>>2},.9)`);
  ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
  ctx.beginPath();ctx.arc(sp.x,sp.y,r,0,Math.PI*2);ctx.strokeStyle=`rgba(${cr},${cg},${cb},${active?.9:.4})`;ctx.lineWidth=sel?2.5:1.5;ctx.stroke();
  if(r>8){ctx.beginPath();ctx.arc(sp.x,sp.y,r*.45,0,Math.PI*2);ctx.fillStyle=`rgba(${cr},${cg},${cb},${active?.25:.1})`;ctx.fill();}
  if(r>10&&camZ>.5){ctx.font=`bold ${Math.max(8,10*camZ)}px 'Courier New'`;ctx.textAlign='center';ctx.fillStyle=`rgba(${cr},${cg},${cb},.9)`;ctx.fillText(n.label,sp.x,sp.y+r*1.7);}
  if(active&&r>6){ctx.beginPath();ctx.arc(sp.x+r*.6,sp.y-r*.6,Math.max(2,3*camZ)*pulse,0,Math.PI*2);ctx.fillStyle=`rgba(${cr},${cg},${cb},.9)`;ctx.fill();}
}

const LOG_LINES=[['Scout-0','#40d8d0','Located data node at depth 4'],['Worker-1','#e88030','Chunk processed — 847 tokens'],['Soldier-0','#e03050','Schema validation passed'],['Builder-0','#9050e0','Report scaffold generated'],['Forager-1','#40c050','Alternate pathway discovered'],['Archivist-0','#4090e0','Pheromone trail strengthened +12%'],['Scout-1','#40d8d0','External endpoint unreachable'],['Queen','#f0c040','Rerouting through Forager branch'],['Worker-2','#e88030','Parallel merge complete'],['Soldier-1','#e03050','Anomaly detected — flagging'],['Queen','#f0c040','Dispatching Scout-0 to validate'],['Archivist-0','#4090e0','Mission pattern archived'],['Builder-1','#9050e0','Automation script compiled'],['Worker-0','#e88030','Data normalized — passing to Builder'],['Forager-0','#40c050','Cache hit — resource retrieved']];
let logIdx=0,lastLog=0,taskCount=0;
function maybeLog(ts){
  if(ts-lastLog<1800)return;lastLog=ts;taskCount++;
  const e=LOG_LINES[logIdx++%LOG_LINES.length];
  const box=document.getElementById('log-entries'),div=document.createElement('div');
  div.className='le fresh';
  const now=new Date();
  div.innerHTML=`<span class="lt">${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}</span><span class="la" style="color:${e[1]}">${e[0]}</span><span class="lm">${e[2]}</span>`;
  box.insertBefore(div,box.firstChild);setTimeout(()=>div.classList.remove('fresh'),2000);
  if(box.children.length>20)box.removeChild(box.lastChild);
  document.getElementById('stat-tasks').textContent=taskCount;
}

const MISSIONS=['THREAT INTELLIGENCE SWEEP','WORKFLOW AUTOMATION BUILD','DATA PIPELINE VALIDATION','KNOWLEDGE GRAPH EXPANSION','SECURITY AUDIT RUN','API INTEGRATION MAP','MEMORY CONSOLIDATION','DEPENDENCY ANALYSIS','OUTPUT REPORT GENERATION'];
let mIdx=0,lastMission=0,missionCount=1;
function maybeUpdateMission(ts){
  if(ts-lastMission<12000)return;lastMission=ts;missionCount++;
  document.getElementById('mission-text').textContent=MISSIONS[mIdx++%MISSIONS.length];
  document.getElementById('stat-missions').textContent=missionCount;
  nodes.filter(n=>n.type!=='QUEEN').forEach(n=>{if(Math.random()>.6){n.task=TASKS[n.type][Math.floor(Math.random()*TASKS[n.type].length)];n.status=Math.random()>.15?'active':'idle';n.phero=.3+Math.random()*.7;}});
  edges.forEach(e=>{e.phero=Math.max(.1,Math.min(1,e.phero+(Math.random()-.4)*.3));});
  if(selectedNode)showDetail(selectedNode);
}

function showDetail(n){
  selectedNode=n;const ti=AT[n.type],pct=Math.round(n.phero*100);
  document.getElementById('agent-detail').innerHTML=`<div class="an">${n.label}</div><div class="at" style="color:${ti.color}">${n.type}</div><div class="sr"><span>Status</span><span class="sv" style="color:${n.status==='active'?'#7ade3e':'#6a5a3a'}">${n.status.toUpperCase()}</span></div><div class="sr"><span>Pheromone</span><span class="sv">${pct}%</span></div><div class="tl">CURRENT TASK</div><div class="tt">${n.task}</div><div class="tl" style="margin-top:10px">TRAIL STRENGTH</div><div class="pb"><div class="pf" style="width:${pct}%"></div></div>`;
}

let dragging=false,dragStart={x:0,y:0},dragCam={x:0,y:0};
canvas.addEventListener('mousedown',e=>{dragging=true;dragStart={x:e.clientX,y:e.clientY};dragCam={x:camX,y:camY};});
canvas.addEventListener('mousemove',e=>{if(dragging){camX=dragCam.x+(e.clientX-dragStart.x);camY=dragCam.y+(e.clientY-dragStart.y);tX=camX;tY=camY;}});
canvas.addEventListener('mouseup',e=>{
  const moved=Math.abs(e.clientX-dragStart.x)+Math.abs(e.clientY-dragStart.y);dragging=false;
  if(moved<5){const wp=s2w(e.clientX,e.clientY),hit=nodes.find(n=>Math.hypot(n.x-wp.x,n.y-wp.y)<AT[n.type].r*2);
    if(hit)showDetail(hit);else{selectedNode=null;document.getElementById('agent-detail').innerHTML='<div style="font-size:10px;color:#4a3a1e;margin-top:18px;text-align:center;">Click an agent node<br>to inspect</div>';}}
});
canvas.addEventListener('wheel',e=>{
  e.preventDefault();const zf=e.deltaY<0?1.12:.89,nz=Math.max(.25,Math.min(3,tZ*zf));
  const wx=(e.clientX-cx-tX)/tZ+cx,wy=(e.clientY-cy-tY)/tZ+cy;
  tZ=nz;tX=e.clientX-cx-(wx-cx)*nz;tY=e.clientY-cy-(wy-cy)*nz;
},{passive:false});

document.getElementById('mission-input').addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;const val=e.target.value.trim();if(!val)return;
  document.getElementById('mission-text').textContent=val.toUpperCase();e.target.value='';
  nodes.filter(n=>n.type!=='QUEEN').forEach(n=>{n.status='active';n.phero=.7+Math.random()*.3;});
  edges.forEach(e=>{e.phero=.6+Math.random()*.4;});
  const box=document.getElementById('log-entries'),div=document.createElement('div');
  div.className='le fresh';div.innerHTML=`<span class="lt">--:--</span><span class="la" style="color:#f0c040">Queen</span><span class="lm">Mission dispatched: ${val.substring(0,60)}</span>`;
  box.insertBefore(div,box.firstChild);missionCount++;document.getElementById('stat-missions').textContent=missionCount;
  const tok=localStorage.getItem('anthill_token')||'';
  fetch('/missions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tok},body:JSON.stringify({goal:val})}).catch(()=>{});
});

document.getElementById('stat-missions').textContent='1';
document.getElementById('stat-tasks').textContent='0';
document.getElementById('mission-text').textContent=MISSIONS[0];

let lastStatTs=0;
function loop(ts){
  requestAnimationFrame(loop);
  camZ+=(tZ-camZ)*.12;camX+=(tX-camX)*.12;camY+=(tY-camY)*.12;
  drawBg();
  edges.forEach(e=>drawEdge(e));
  maybeSpawn(ts);
  particles=particles.filter(p=>(p.t+=p.speed)<=1);
  drawParticles();
  nodes.forEach(n=>drawNode(n,ts));
  nodes.forEach(n=>{if(n.type!=='QUEEN')n.phero=Math.max(.15,Math.min(1,n.phero+Math.sin(ts*.0003+n.pp)*.0008));});
  maybeLog(ts);
  maybeUpdateMission(ts);
  if(ts-lastStatTs>500){lastStatTs=ts;const a=nodes.filter(n=>n.status==='active').length;document.getElementById('stat-active').textContent=a;const avg=nodes.reduce((s,n)=>s+n.phero,0)/nodes.length;document.getElementById('stat-phero').textContent=Math.round(avg*100)+'%';}
}
requestAnimationFrame(loop);
</script>
</body>
</html>
