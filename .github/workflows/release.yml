name: Release

# Builds a tagged release: self-contained linux-x64/win-x64 binaries, a versioned Docker image
# pushed to GHCR, and a GitHub Release (created as a DRAFT — see note at the bottom of this file)
# with release notes pulled straight from CHANGELOG.md.
#
# Trigger by tagging a commit whose AnthillRuntime.Version already matches:
#   git tag v1.8.7
#   git push origin v1.8.7
#
# Or run manually from the Actions tab (workflow_dispatch) against an existing tag.

on:
  push:
    tags:
      - 'v*.*.*'      # three-part releases, e.g. v1.8.15
      - 'v*.*.*.*'    # four-part maintenance patches, e.g. v1.8.14.4
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (e.g. v1.8.7)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  verify-version:
    name: Verify tag matches AnthillRuntime.Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      ref: ${{ steps.extract.outputs.ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Compare tag to the Version constant
        id: extract
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          TAG_VERSION="${TAG#v}"
          CODE_VERSION=$(grep -oP '(?<=public const string Version = ")[^"]+' src/Anthill.Core/Configuration/AnthillRuntime.cs)
          echo "Tag version:  $TAG_VERSION"
          echo "Code version: $CODE_VERSION"
          if [ "$TAG_VERSION" != "$CODE_VERSION" ]; then
            echo "::error::Tag $TAG doesn't match AnthillRuntime.Version ($CODE_VERSION). Bump the version, commit, then re-tag."
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "ref=${{ inputs.tag || github.ref }}" >> "$GITHUB_OUTPUT"

  build-binaries:
    name: Publish ${{ matrix.rid }}
    needs: verify-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive: tar.gz
          - rid: win-x64
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish self-contained single-file (${{ matrix.rid }})
        run: |
          dotnet publish src/Anthill.Cli/Anthill.Cli.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true -p:DebugType=none \
            -o ./publish/${{ matrix.rid }}

      - name: Package archive
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          cp config.example.json ./publish/${{ matrix.rid }}/config.example.json
          cp README.md CHANGELOG.md ./publish/${{ matrix.rid }}/
          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd ./publish/${{ matrix.rid }} && zip -r "../../anthill-${VERSION}-${{ matrix.rid }}.zip" .)
          else
            tar -czf "anthill-${VERSION}-${{ matrix.rid }}.tar.gz" -C ./publish/${{ matrix.rid }} .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: anthill-${{ matrix.rid }}
          path: anthill-*.${{ matrix.archive }}

  build-docker:
    name: Build + push Docker image (GHCR)
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.ref }}

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository }}"
          docker build -t "$IMAGE:$VERSION" -t "$IMAGE:latest" .

      - name: Push
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          IMAGE="ghcr.io/${{ github.repository }}"
          docker push "$IMAGE:$VERSION"
          docker push "$IMAGE:latest"

  publish-release:
    name: Publish GitHub Release
    needs: [verify-version, build-binaries, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.ref }}

      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Extract this version's CHANGELOG section
        run: |
          VERSION="${{ needs.verify-version.outputs.version }}"
          awk -v hdr="## v${VERSION}" '
            $0 ~ /^## v/ && found { exit }
            index($0, hdr) == 1 { found=1 }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "(No matching ## v${VERSION} section found in CHANGELOG.md — see the file directly.)" > /tmp/release-notes.md
          fi
          echo "---" >> /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "Docker: \`docker pull ghcr.io/${{ github.repository }}:${VERSION}\`" >> /tmp/release-notes.md
          echo "LXC: \`curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/deploy/lxc/setup.sh | bash\`" >> /tmp/release-notes.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.verify-version.outputs.ref }}
          name: ANTHILL v${{ needs.verify-version.outputs.version }}
          body_path: /tmp/release-notes.md
          files: artifacts/*
          draft: false
          make_latest: true
          # A four-part version like 1.8.14.4 is a maintenance patch, not a pre-release.
          prerelease: false

# On every tag push (git tag vX.Y.Z[.W] && git push origin vX.Y.Z[.W]) this workflow:
#   1. verify-version — fails fast unless the tag matches AnthillRuntime.Version.
#   2. build-binaries — self-contained linux-x64 (.tar.gz) + win-x64 (.zip), each bundling
#      config.example.json, README, CHANGELOG.
#   3. build-docker — builds and PUSHES ghcr.io/<repo>:<version> and :latest (GitHub Packages).
#   4. publish-release — creates and PUBLISHES the GitHub Release (not a draft) with the matching
#      CHANGELOG section as notes and both archives attached, marked as "latest".
#
# First run only: GHCR creates the package as PRIVATE by default. Make it public once at
#   github.com/users/<you>/packages/container/operation-anthill/settings  →  Change visibility.
# If verify-version fails, the tag doesn't match AnthillRuntime.Version — bump the version file,
# commit, delete/re-push the tag, and try again.
