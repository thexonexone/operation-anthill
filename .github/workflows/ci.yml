name: CI

# Runs the checks nobody in this project's sandbox environment can run locally: a real .NET SDK
# build+test on Linux and Windows, a publish+selftest smoke test, a Docker build+boot smoke test,
# and a shellcheck pass on the LXC installer. Treat a green run here as the actual "does this
# work" signal for any change touching build/deploy — see docs/DEPLOYMENT.md.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (.NET, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Anthill.sln

      - name: Build (Release)
        run: dotnet build Anthill.sln -c Release --no-restore

      - name: Test
        run: dotnet test Anthill.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: test-results/*.trx
          if-no-files-found: ignore

  publish-and-selftest:
    name: Publish + --selftest (linux-x64, self-contained)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish self-contained single-file (matches build.sh)
        run: |
          dotnet publish src/Anthill.Cli/Anthill.Cli.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:DebugType=none \
            -o ./publish/linux-x64

      - name: Run the framework self-test harness
        run: |
          chmod +x ./publish/linux-x64/anthill
          ANTHILL_API_TOKEN="ci-$(openssl rand -hex 24)" ./publish/linux-x64/anthill --selftest

      # Everything below only runs if publish + selftest succeeded (steps are sequential),
      # so a broken build can never produce a downloadable package.
      - name: Read version for artifact naming
        id: version
        run: |
          VERSION=$(grep -oP '(?<=public const string Version = ")[^"]+' src/Anthill.Core/Configuration/AnthillRuntime.cs)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Packaging as anthill-linux-x64-v$VERSION"

      - name: Package linux-x64 publish output
        run: |
          cp config.example.json README.md CHANGELOG.md ./publish/linux-x64/
          tar -czf "anthill-linux-x64-v${{ steps.version.outputs.version }}.tar.gz" -C ./publish/linux-x64 .

      - name: Upload linux-x64 package (CI artifact)
        uses: actions/upload-artifact@v4
        with:
          name: anthill-linux-x64-v${{ steps.version.outputs.version }}
          path: anthill-linux-x64-v*.tar.gz
          if-no-files-found: error

  docker:
    name: Docker build + boot smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Build image
        run: docker build -t anthill:ci .

      - name: Boot the container (bridge mode, matches Windows/macOS docs)
        run: |
          docker run -d --name anthill-ci -p 8713:8713 anthill:ci

      - name: Wait for HEALTHCHECK to report healthy
        run: |
          status="starting"
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' anthill-ci 2>/dev/null || echo "starting")
            echo "  [$i/30] health: $status"
            if [ "$status" = "healthy" ]; then break; fi
            if [ "$status" = "unhealthy" ]; then
              echo "::error::Container reported unhealthy"
              docker logs anthill-ci
              exit 1
            fi
            sleep 2
          done
          if [ "$status" != "healthy" ]; then
            echo "::error::Container never became healthy within 60s"
            docker logs anthill-ci
            exit 1
          fi

      - name: Hit /health and confirm expected fields
        run: |
          curl -fsS http://localhost:8713/health | tee /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json || (echo "::error::unexpected /health payload"; exit 1)

      - name: Dump container logs (always, for visibility)
        if: always()
        run: docker logs anthill-ci || true

      - name: Cleanup
        if: always()
        run: docker rm -f anthill-ci || true

  lint-lxc-installer:
    name: Shellcheck the LXC installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck deploy/lxc/setup.sh
        run: shellcheck deploy/lxc/setup.sh

      - name: bash -n syntax check (belt and suspenders)
        run: bash -n deploy/lxc/setup.sh

  ui-integrity:
    name: UI integrity (encoding + JS parse)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # An editor/tool in the pipeline has repeatedly re-saved the embedded UI as non-UTF-8,
      # flattening icon glyphs (carets/send/close/pheromone headers) to '?' and other glyphs to the
      # U+FFFD replacement char. Fail the build if any of that corruption is present so it can never
      # merge again. The one legitimate literal '?' — the <kbd>?</kbd> help-shortcut key — is allowed.
      - name: No UTF-8 glyph corruption in the console UI
        run: |
          python3 - <<'PY'
          import re, sys
          p = "src/Anthill.Api/Ui/index.html"
          s = open(p, encoding="utf-8").read()
          problems = []
          n = s.count("�")
          if n: problems.append(f"{n} U+FFFD replacement char(s) (‘�’)")
          bare = re.findall(r"(?<!<kbd)>\?<", s)          # bare >?< icons, excluding <kbd>?</kbd>
          if bare: problems.append(f"{len(bare)} bare '>?<' icon glyph(s) flattened to '?'")
          labeled = re.findall(r">\s*\?\s+[A-Z][a-z]", s)  # '>? Label' buttons
          if labeled: problems.append(f"{len(labeled)} '>? Label' button glyph(s)")
          t = s.count("'?':'?'")                            # caret ternaries det.open?'?':'?'
          if t: problems.append(f"{t} \"'?':'?'\" caret ternary(ies)")
          if problems:
              print(f"UI encoding corruption detected in {p}:")
              for x in problems: print("  -", x)
              print("These are flattened glyphs — re-save index.html as UTF-8 and restore the icons.")
              sys.exit(1)
          print("UI encoding OK: no flattened glyphs or replacement chars.")
          PY

      - name: Setup Node (for embedded-JS parse check)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Embedded UI JavaScript parses cleanly
        run: |
          python3 - <<'PY'
          import re
          s = open("src/Anthill.Api/Ui/index.html", encoding="utf-8").read()
          blocks = [b for b in re.findall(r"<script\b[^>]*>(.*?)</script>", s, re.S) if b.strip()]
          open("/tmp/ui.js", "w", encoding="utf-8").write("\n;\n".join(blocks))
          PY
          node --check /tmp/ui.js
